name: Feature request
description: Propose an enhancement or a new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today, or what is painful?
      placeholder: We mirror an internal npm registry that needs a custom auth header on upstream requests.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Config sketch welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you tried, other designs that could solve it.
  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Registry adapters (new ecosystem)
        - Scanners / gates
        - Policy engine
        - Cache
        - Admin console
        - Operations / deployment
        - Other
