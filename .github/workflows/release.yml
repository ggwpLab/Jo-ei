name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release
  packages: write # push images to ghcr.io

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history and tags for goreleaser version detection
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Extract release notes from CHANGELOG.md
        run: ./scripts/release-notes.sh "${GITHUB_REF_NAME#v}" > /tmp/release-notes.md
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # goreleaser's --release-notes flag did not populate the GitHub release
      # body (v0.2.0 and v0.3.0 both shipped empty). Set it explicitly from the
      # extracted CHANGELOG section and fail the release if the body is empty.
      - name: Set release notes on the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          test -s /tmp/release-notes.md || { echo "release notes file is empty"; exit 1; }
          gh release edit "${GITHUB_REF_NAME}" --notes-file /tmp/release-notes.md
          body=$(gh release view "${GITHUB_REF_NAME}" --json body -q .body)
          test -n "$body" || { echo "release body still empty after edit"; exit 1; }
