services:
  jo-ei:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/etc/jo-ei/config.yaml:ro
      - cache-data:/var/cache/jo-ei
      - jo-ei-db:/var/lib/jo-ei
    environment:
      - JOEI_LOGGING_LEVEL=info
      - JOEI_CONSOLE_AUTH_USERS=${JOEI_CONSOLE_AUTH_USERS}
    depends_on:
      clamav:
        condition: service_healthy
      trivy:
        condition: service_started
    restart: unless-stopped

  clamav:
    image: clamav/clamav:stable
    volumes:
      - clamav-db:/var/lib/clamav
    restart: unless-stopped

  trivy:
    image: aquasec/trivy:0.71.2
    command: ["server", "--listen", "0.0.0.0:4954"]
    volumes:
      - trivy-cache:/root/.cache/trivy
    restart: unless-stopped

  # Example ICAP engine (Kaspersky / Dr.Web). Point a malware.scanners[] entry
  # at it with type: icap, address: "tcp:icap:1344", service: <vendor service>.
  # icap:
  #   image: <vendor/icap-image>
  #   restart: unless-stopped

volumes:
  cache-data:
  clamav-db:
  jo-ei-db:
  trivy-cache:
