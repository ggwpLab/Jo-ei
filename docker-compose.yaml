version: "3.9"

services:
  jo-ei:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/etc/jo-ei/config.yaml:ro
      - cache-data:/var/cache/jo-ei
      - clamav-socket:/var/run/clamav
    environment:
      - JOEI_LOGGING_LEVEL=info
    depends_on:
      - clamav
    restart: unless-stopped

  clamav:
    image: clamav/clamav:stable
    volumes:
      - clamav-socket:/var/run/clamav
      - clamav-db:/var/lib/clamav
    restart: unless-stopped

  # Example ICAP engine (Kaspersky / Dr.Web). Point a malware.scanners[] entry
  # at it with type: icap, address: "tcp:icap:1344", service: <vendor service>.
  # icap:
  #   image: <vendor/icap-image>
  #   restart: unless-stopped

volumes:
  cache-data:
  clamav-socket:
  clamav-db:
