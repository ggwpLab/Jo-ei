server:
  listen: ":8080"
  # Max concurrent in-flight requests to each upstream registry host (metadata,
  # transparent proxy and artifact downloads combined). Default 6 when unset.
  upstream_max_concurrent: 6
  # Max request *rate* per upstream registry host (token bucket, burst = 2x).
  # Registries throttle by rate, not concurrency, so this is the primary defense
  # against HTTP 429. Default 10 when unset; raise for a large shared instance.
  upstream_rate_per_second: 10

registries:
  pypi:
    upstreams:
      - "https://pypi.org"
    enabled: true
  npm:
    upstreams:
      - "https://registry.npmjs.org"
    enabled: true
  maven:
    upstreams:
      - "https://repo1.maven.org/maven2"
      - "https://maven-central.storage-download.googleapis.com/maven2"
    enabled: true
  rubygems:
    upstreams:
      - "https://rubygems.org"
    enabled: true
  docker:
    upstreams:
      - "https://registry-1.docker.io"
    enabled: true   # opt-in; flip to false to disable the Docker pull-through proxy

supply_chain:
  min_age_hours: 24
  mode: "enforce"

cve:
  enabled: true
  base_url: "https://api.osv.dev"
  block_on: "HIGH"
  cache_ttl_minutes: 1440

# Container-image vulnerability scanning (Trivy). Separate from the osv.dev CVE
# scanner above: a different engine and model. Severity threshold and denylist
# come from the active policy profile (cve_min_severity / denylist).
image_scan:
  enabled: true
  trivy_server: "http://trivy:4954"
  timeout_seconds: 120
  scanners: "vuln,secret"
  max_layer_bytes: 2147483648   # 2 GB; a larger layer fails closed (blocks the image)

malware:
  # Cap simultaneous scans so download bursts don't overwhelm the engines'
  # worker pools and make clamd/ICAP responses time out. 0 = default (8),
  # roughly clamd's default thread pool. Raise it if you tuned clamd MaxThreads.
  max_concurrent_scans: 8
  scanners:
    - type: clamav
      # clamav/clamav image listens on TCP 3310 by default; its unix socket
      # lives at /tmp/clamd.sock inside its own container and is not shareable.
      address: "tcp:clamav:3310"
      timeout_seconds: 30
    # Add a commercial engine over ICAP (Kaspersky, Dr.Web, …):
    # - type: icap
    #   address: "tcp:kaspersky-icap:1344"
    #   service: "avscan"
    #   timeout_seconds: 30

# Scanner health probes (optional). Surfaced in the console overview.
# health:
#   probe_interval_seconds: 30   # how often socket scanners (clamd/ICAP) are probed
#   slow_threshold_ms: 2000      # latency above which a scanner shows "warn"

cache:
  backend: "local"
  local:
    path: "/var/cache/jo-ei"
    max_size_gb: 100
  # S3 backend is reserved for a future release; setting backend: s3 currently
  # fails fast at startup.
  # s3:
  #   endpoint: "https://s3.amazonaws.com"
  #   bucket: "joei-cache"
  #   region: "us-east-1"

# Persistent state (required). Telemetry — event history, lifetime counters and
# per-day metrics — is stored in an embedded SQLite database and is the single
# source of truth. The path must be set; the proxy fails to start without it.
database:
  path: "/var/lib/jo-ei/jo-ei.db"
  event_retention_days: 30    # prune persisted events older than this
  daily_retention_days: 365   # prune per-day metric rows older than this

policy:
  active_profile: "production"
  profiles:
    dev:
      cve_block: false
      supply_chain_block: false
      allowlist: []
      denylist: []
    staging:
      cve_block: true
      cve_min_severity: "HIGH"
      supply_chain_block: true
      allowlist: []
      denylist: []
    production:
      cve_block: true
      cve_min_severity: "HIGH"
      supply_chain_block: true
      malware_block: true
      allowlist: []
      denylist: []

logging:
  level: "info"
  format: "json"
  output: "stdout"

# Admin console / API authentication (HTTP Basic).
# Without at least one user, /console/ and /api/ return HTTP 503 (fail-closed).
# Generate a hash with:  printf '%s' 'your-password' | jo-ei hashpw
# Prefer the JOEI_CONSOLE_AUTH_USERS env var so hashes stay out of this file.
# console:
#   auth:
#     users:
#       - username: admin
#         password_hash: "$2a$10$REPLACE_WITH_A_REAL_BCRYPT_HASH"
