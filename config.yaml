server:
  listen: ":8080"

registries:
  pypi:
    upstreams:
      - "https://pypi.org"
    enabled: true
  npm:
    upstreams:
      - "https://registry.npmjs.org"
    enabled: true
  maven:
    upstreams:
      - "https://repo1.maven.org/maven2"
      - "https://repo.spring.io/release"
    enabled: true
  rubygems:
    upstreams:
      - "https://rubygems.org"
    enabled: true

supply_chain:
  min_age_hours: 24
  mode: "enforce"

cve:
  enabled: true
  base_url: "https://api.osv.dev"
  block_on: "HIGH"
  cache_ttl_minutes: 1440

malware:
  scanners:
    - type: clamav
      address: "unix:///var/run/clamav/clamd.sock"
      timeout_seconds: 30
    # Add a commercial engine over ICAP (Kaspersky, Dr.Web, …):
    # - type: icap
    #   address: "tcp:kaspersky-icap:1344"
    #   service: "avscan"
    #   timeout_seconds: 30

cache:
  backend: "local"
  local:
    path: "/var/cache/jo-ei"
    max_size_gb: 100
  # S3 backend is reserved for a future release; setting backend: s3 currently
  # fails fast at startup.
  # s3:
  #   endpoint: "https://s3.amazonaws.com"
  #   bucket: "joei-cache"
  #   region: "us-east-1"

policy:
  active_profile: "production"
  profiles:
    dev:
      cve_block: false
      supply_chain_block: false
      allowlist: []
      denylist: []
    staging:
      cve_block: true
      cve_min_severity: "HIGH"
      supply_chain_block: true
      allowlist: []
      denylist: []
    production:
      cve_block: true
      cve_min_severity: "HIGH"
      supply_chain_block: true
      malware_block: true
      allowlist: []
      denylist: []

logging:
  level: "info"
  format: "json"
  output: "stdout"
