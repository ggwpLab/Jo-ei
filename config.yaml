server:
  listen: ":8080"

registries:
  pypi:
    upstreams:
      - "https://pypi.org"
    enabled: true
  npm:
    upstreams:
      - "https://registry.npmjs.org"
    enabled: true
  maven:
    upstreams:
      - "https://repo1.maven.org/maven2"
      - "https://repo.spring.io/release"
    enabled: true
  rubygems:
    upstreams:
      - "https://rubygems.org"
    enabled: true

supply_chain:
  min_age_hours: 24
  mode: "enforce"

cve:
  enabled: true
  base_url: "https://api.osv.dev"
  block_on: "HIGH"
  cache_ttl_minutes: 1440

malware:
  scanners:
    - type: clamav
      # clamav/clamav image listens on TCP 3310 by default; its unix socket
      # lives at /tmp/clamd.sock inside its own container and is not shareable.
      address: "tcp:clamav:3310"
      timeout_seconds: 30
    # Add a commercial engine over ICAP (Kaspersky, Dr.Web, …):
    # - type: icap
    #   address: "tcp:kaspersky-icap:1344"
    #   service: "avscan"
    #   timeout_seconds: 30

# Scanner health probes (optional). Surfaced in the console overview.
# health:
#   probe_interval_seconds: 30   # how often socket scanners (clamd/ICAP) are probed
#   slow_threshold_ms: 2000      # latency above which a scanner shows "warn"

cache:
  backend: "local"
  local:
    path: "/var/cache/jo-ei"
    max_size_gb: 100
  # S3 backend is reserved for a future release; setting backend: s3 currently
  # fails fast at startup.
  # s3:
  #   endpoint: "https://s3.amazonaws.com"
  #   bucket: "joei-cache"
  #   region: "us-east-1"

policy:
  active_profile: "production"
  profiles:
    dev:
      cve_block: false
      supply_chain_block: false
      allowlist: []
      denylist: []
    staging:
      cve_block: true
      cve_min_severity: "HIGH"
      supply_chain_block: true
      allowlist: []
      denylist: []
    production:
      cve_block: true
      cve_min_severity: "HIGH"
      supply_chain_block: true
      malware_block: true
      allowlist: []
      denylist: []

logging:
  level: "info"
  format: "json"
  output: "stdout"

# Admin console / API authentication (HTTP Basic).
# Without at least one user, /console/ and /api/ return HTTP 503 (fail-closed).
# Generate a hash with:  printf '%s' 'your-password' | jo-ei hashpw
# Prefer the JOEI_CONSOLE_AUTH_USERS env var so hashes stay out of this file.
# console:
#   auth:
#     users:
#       - username: admin
#         password_hash: "$2a$10$REPLACE_WITH_A_REAL_BCRYPT_HASH"
