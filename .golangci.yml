version: "2"
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    errcheck:
      exclude-functions:
        - (*os.File).Close
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (net.Conn).Close
        - (*database/sql.Rows).Close
        - os.Remove
  exclusions:
    rules:
      # Tests deliberately ignore many error returns (mock servers, cleanup).
      - path: _test\.go
        linters:
          - errcheck
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ggwpLab/Jo-ei
